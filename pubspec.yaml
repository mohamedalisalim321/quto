name: quto
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  provider: ^6.1.5+1
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.3
  
  google_nav_bar: ^5.0.7
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"

  adaptive_icon_background: "#FFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"


flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/

  fonts:
    - family: Inter 
      fonts:
        - asset: assets/fonts/Inter.ttf
    
    - family: Play 
      fonts:
        - asset: assets/fonts/Playfair.ttf